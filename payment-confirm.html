<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed — AeroMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <style>
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg-base); overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%,
        rgba(34,197,94,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .confirm-page {
      text-align: center; padding: 32px 24px;
      max-width: 500px; width: 100%;
      position: relative; z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    /* ── Checkmark animation ── */
    .check-wrap {
      width: 110px; height: 110px; margin: 0 auto 32px;
      position: relative;
    }
    .check-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(34,197,94,0.1);
      border: 2px solid var(--success);
      display: flex; align-items: center; justify-content: center;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .check-mark {
      font-size: 3rem;
      animation: popIn 0.5s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .check-glow {
      position: absolute; inset: -10px; border-radius: 50%;
      background: radial-gradient(circle, rgba(34,197,94,0.15) 0%, transparent 70%);
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    .confirm-title {
      font-size: 2rem; font-weight: 900; color: var(--text-primary);
      margin-bottom: 8px;
    }
    .confirm-sub {
      color: var(--text-secondary); margin-bottom: 32px; font-size: 0.95rem;
    }

    /* ── Detail card ── */
    .confirm-card {
      background: var(--bg-card);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-lg); padding: 20px 24px;
      margin-bottom: 28px; text-align: left;
    }
    .confirm-card .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .confirm-card .row:last-child { border-bottom: none; }
    .confirm-card .lbl { color: var(--text-secondary); }
    .confirm-card .val { font-weight: 600; color: var(--text-primary); }
    .confirm-card .row.total .val { color: var(--success); font-size: 1.1rem; font-weight: 800; }

    .email-note {
      font-size: 0.8rem; color: var(--text-muted); margin-bottom: 24px;
      line-height: 1.6;
    }

    .confirm-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Confetti dots ── */
    .confetti-dot {
      position: fixed; width: 8px; height: 8px; border-radius: 50%;
      animation: confettiFall linear forwards;
      pointer-events: none;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
</head>
<body>

  <div class="confirm-page">
    <div class="check-wrap">
      <div class="check-glow"></div>
      <div class="check-circle">
        <span class="check-mark">✓</span>
      </div>
    </div>

    <h1 class="confirm-title">Payment Confirmed!</h1>
    <p class="confirm-sub">Your seat is locked in. Safe travels! ✈️</p>

    <div class="confirm-card">
      <div class="row"><span class="lbl">Route</span><span class="val" id="conf-route">—</span></div>
      <div class="row"><span class="lbl">Booking ID</span><span class="val" id="conf-id">—</span></div>
      <div class="row"><span class="lbl">Flight</span><span class="val" id="conf-flight">—</span></div>
      <div class="row"><span class="lbl">Seats</span><span class="val" id="conf-seats">—</span></div>
      <div class="row total"><span class="lbl">Total Paid</span><span class="val" id="conf-total">—</span></div>
    </div>

    <p class="email-note" id="conf-email-note"></p>

    <div class="confirm-actions">
      <a href="flights.html" class="btn-primary" style="text-decoration:none;width:auto;padding:13px 28px;">
        Book Another Flight
      </a>
      <a href="my-bookings.html" class="btn-ghost" style="text-decoration:none;">
        My Bookings
      </a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/payment-confirm.js"></script>
</body>
</html>
